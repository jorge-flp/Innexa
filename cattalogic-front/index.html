<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catallogic - Painel do Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-fundo font-inter text-texto min-h-screen flex">

    <aside class="w-64 bg-primaria text-white flex flex-col p-6 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-secundaria rounded-lg flex items-center justify-center font-bold text-white">C</div>
            <span class="text-xl font-bold tracking-wide">Catallogic</span>
        </div>
        <nav class="space-y-4">
            <a href="#" class="flex items-center gap-3 bg-secundaria text-white px-4 py-2.5 rounded-lg font-semibold transition">
                📦 Produtos
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full">
        <header class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-2xl md:text-3xl font-bold text-primaria">Painel Geral</h1>
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium bg-gray-200 px-3 py-1 rounded-full text-primaria">Modo Administrador</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-1 h-fit">
                <h2 class="text-lg font-bold text-primaria mb-4">Cadastrar Novo Produto</h2>
                <form id="produtoForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Nome do Produto</label>
                        <input type="text" id="nome" required class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-secundaria transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Descrição</label>
                        <textarea id="descricao" rows="2" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-secundaria transition"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Preço (R$)</label>
                            <input type="number" id="preco" step="0.01" required class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-secundaria transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Estoque</label>
                            <input type="number" id="quantidadeEstoque" required class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-secundaria transition">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-secundaria hover:bg-sky-600 text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition duration-200 mt-2">
                        Salvar Produto
                    </button>
                </form>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
                <h2 class="text-lg font-bold text-primaria mb-4">Últimos Produtos Cadastrados</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-100 text-xs font-bold uppercase tracking-wider text-gray-400 bg-gray-50">
                                <th class="py-3 px-4">Nome</th>
                                <th class="py-3 px-4">Preço</th>
                                <th class="py-3 px-4">Estoque</th>
                                <th class="py-3 px-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaProdutos" class="divide-y divide-gray-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
